openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Poultry Trading ERP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management (agents)
  - name: customers
    description: Customer management
  - name: products
    description: Product management
  - name: orders
    description: Order management
  - name: deliveryLogs
    description: Delivery log entries
  - name: notifications
    description: Notification system
  - name: finance
    description: Finance and reporting

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (agents)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a new customer
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (admin sees all, agent sees own)
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: agentId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderWithDetails"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithDetails"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithDetails"
    put:
      operationId: updateOrder
      tags: [orders]
      summary: Update an order (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithDetails"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (agent or admin)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithDetails"

  /delivery-logs:
    post:
      operationId: createDeliveryLog
      tags: [deliveryLogs]
      summary: Create a delivery log
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeliveryLogRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryLog"

  /delivery-logs/{orderId}:
    get:
      operationId: getDeliveryLogs
      tags: [deliveryLogs]
      summary: Get delivery logs for an order
      security:
        - BearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryLog"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationItem"

  /notifications/mark-read:
    post:
      operationId: markNotificationsRead
      tags: [notifications]
      summary: Mark notifications as read
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /finance/summary:
    get:
      operationId: getFinanceSummary
      tags: [finance]
      summary: Get finance summary (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Finance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceSummary"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - token
        - user

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
          nullable: true
        username:
          type: string
        role:
          type: string
          enum: [admin, agent]
        createdAt:
          type: string
      required:
        - id
        - name
        - username
        - role
        - createdAt

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, agent]
      required:
        - name
        - username
        - password
        - role

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, agent]

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        openingBalance:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - openingBalance
        - createdAt

    CreateCustomerRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        location:
          type: string
        openingBalance:
          type: string
        notes:
          type: string
      required:
        - name

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [chicks, chickens, other]
        unitPrice:
          type: string
        stockQuantity:
          type: integer
        description:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - type
        - unitPrice
        - stockQuantity
        - createdAt

    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [chicks, chickens, other]
        unitPrice:
          type: string
        stockQuantity:
          type: integer
        description:
          type: string
      required:
        - name
        - type
        - unitPrice

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        quantity:
          type: integer
        unitPrice:
          type: string
        product:
          $ref: "#/components/schemas/Product"
      required:
        - id
        - orderId
        - productId
        - quantity
        - unitPrice

    OrderWithDetails:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        agentId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [pending, preparing, delivering, delivered, cancelled]
        orderDate:
          type: string
        deliveryDate:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        customer:
          $ref: "#/components/schemas/Customer"
        agent:
          $ref: "#/components/schemas/UserProfile"
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
      required:
        - id
        - customerId
        - status
        - orderDate
        - createdAt
        - customer
        - items

    CreateOrderRequest:
      type: object
      properties:
        customerId:
          type: integer
        agentId:
          type: integer
        orderDate:
          type: string
        deliveryDate:
          type: string
        notes:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"
      required:
        - customerId
        - orderDate
        - items

    UpdateOrderRequest:
      type: object
      properties:
        customerId:
          type: integer
        agentId:
          type: integer
        status:
          type: string
          enum: [pending, preparing, delivering, delivered, cancelled]
        orderDate:
          type: string
        deliveryDate:
          type: string
        notes:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    UpdateOrderStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, preparing, delivering, delivered, cancelled]
      required:
        - status

    OrderItemInput:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        unitPrice:
          type: string
      required:
        - productId
        - quantity
        - unitPrice

    DeliveryLog:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        agentId:
          type: integer
        collectedAmount:
          type: string
        deliveredQuantity:
          type: integer
        fuelExpense:
          type: string
        otherExpenses:
          type: string
        notes:
          type: string
          nullable: true
        loggedAt:
          type: string
      required:
        - id
        - orderId
        - agentId
        - collectedAmount
        - deliveredQuantity
        - fuelExpense
        - otherExpenses
        - loggedAt

    CreateDeliveryLogRequest:
      type: object
      properties:
        orderId:
          type: integer
        collectedAmount:
          type: string
        deliveredQuantity:
          type: integer
        fuelExpense:
          type: string
        otherExpenses:
          type: string
        notes:
          type: string
      required:
        - orderId
        - collectedAmount
        - deliveredQuantity
        - fuelExpense
        - otherExpenses

    NotificationItem:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        message:
          type: string
        orderId:
          type: integer
          nullable: true
        isRead:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - userId
        - message
        - isRead
        - createdAt

    MarkReadRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
        all:
          type: boolean
      required: []

    FinanceSummary:
      type: object
      properties:
        totalOrders:
          type: integer
        deliveredOrders:
          type: integer
        totalRevenue:
          type: string
        totalCollected:
          type: string
        ordersByStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        agentPerformance:
          type: array
          items:
            $ref: "#/components/schemas/AgentPerformance"
        customerBalances:
          type: array
          items:
            $ref: "#/components/schemas/CustomerBalance"
        productSales:
          type: array
          items:
            $ref: "#/components/schemas/ProductSale"
      required:
        - totalOrders
        - deliveredOrders
        - totalRevenue
        - totalCollected
        - ordersByStatus
        - agentPerformance
        - customerBalances
        - productSales

    StatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required:
        - status
        - count

    AgentPerformance:
      type: object
      properties:
        agentId:
          type: integer
        agentName:
          type: string
        ordersCompleted:
          type: integer
        totalCollected:
          type: string
        totalFuelExpense:
          type: string
        totalOtherExpenses:
          type: string
      required:
        - agentId
        - agentName
        - ordersCompleted
        - totalCollected
        - totalFuelExpense
        - totalOtherExpenses

    CustomerBalance:
      type: object
      properties:
        customerId:
          type: integer
        customerName:
          type: string
        openingBalance:
          type: string
        totalOrders:
          type: integer
        totalCollected:
          type: string
      required:
        - customerId
        - customerName
        - openingBalance
        - totalOrders
        - totalCollected

    ProductSale:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        unitsSold:
          type: integer
        totalRevenue:
          type: string
      required:
        - productId
        - productName
        - unitsSold
        - totalRevenue
