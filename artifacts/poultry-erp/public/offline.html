<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>غير متصل - نظام الدواجن</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f0faf5;
      color: #1a3d2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .icon-wrap {
      width: 96px;
      height: 96px;
      background: #e6f7f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .icon-wrap svg { width: 52px; height: 52px; }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #0f5e3e;
    }
    p {
      font-size: 1rem;
      color: #4a7a62;
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 32px;
    }
    button {
      background: #0f9e6e;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    button:hover { background: #0a7a54; }
    .brand {
      position: fixed;
      bottom: 24px;
      font-size: 0.8rem;
      color: #8ab5a0;
    }
  </style>
</head>
<body>
  <div class="icon-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#0f9e6e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>
  <h1>لا يوجد اتصال بالإنترنت</h1>
  <p>يبدو أن اتصالك بالإنترنت منقطع. تحقق من الشبكة ثم حاول مجدداً.</p>
  <button onclick="window.location.reload()">إعادة المحاولة</button>
  <span class="brand">نظام إدارة تجارة الدواجن</span>
</body>
</html>
